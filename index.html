<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow – Manage Tasks Smarter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    /* MAKE FOOTER STICK TO BOTTOM */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;

      background: linear-gradient(90deg, #9e1f1f, #161617);
      background-image: url("Download maroon background high quality for free.jpg");
      background-repeat: repeat;
      background-size: 300px 100px;
      color: #222;
    }

    /* PAGE CONTENT */
    .page-content {
      flex: 1;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: linear-gradient(20deg, #830202, #1f1f20);
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #e8e7eb;
    }

    nav ul {
      display: flex;
      gap: 25px;
      list-style: none;
    }

    nav ul li a {
      text-decoration: none;
      color: #e5e7eb;
      font-weight: 500;
      font-size: 15px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: all 0.25s ease;
    }

    nav ul li a:hover {
      background: rgba(255,255,255,0.1);
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 60px;
    }

    .hero-text {
      max-width: 520px;
      color: #e8ddff;
    }

    .hero-text h1 {
      font-size: 44px;
      line-height: 1.2;
      margin-bottom: 30px;
    }

    .hero-text p {
      color: #cfcfcf;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
    }

    .btn-primary {
      background: #ff5c5c;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      text-decoration: none;
      display: inline-block;
    }

    .banner-img {
      width: 600px;
      height: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.25));
      background-color: rgb(104, 0, 0);
    }

    /* FOOTER */
    footer {
      background: linear-gradient(20deg, #1f1f20, #830202);
      color: #d1d5db;
      text-align: center;
      padding: 16px;
      font-size: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

  <div class="page-content">

    <!-- NAVBAR -->
    <nav>
      <div class="logo">TaskFlow</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Dashboard.html">Dashboard</a></li>
        <li><a href="board.html">Board</a></li>
        <li><a href="about.html">Support</a></li>
      </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-text">
        <h1>The easiest way to manage your tasks</h1>
        <p>
          Organize, track, and complete your tasks effortlessly.
          TaskFlow helps students and teams stay productive without complexity.
        </p>
        <div class="hero-buttons">
          <a href="Dashboard.html" class="btn-primary">ENTER DASHBOARD</a>
        </div>
      </div>

      <img src="Gemini_Generated_Image_5bry5e5bry5e5bry-Photoroom.png"
           alt="TaskFlow"
           class="banner-img">
    </section>

  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 TaskFlow • Built for students & teams
  </footer>

</body>
</html>
